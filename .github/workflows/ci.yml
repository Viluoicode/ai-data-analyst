name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore AiDataAnalyst.slnx
      - name: Build
        run: dotnet build AiDataAnalyst.slnx -c Release --no-restore
      - name: Unit tests
        run: dotnet test tests/Analyst.Tests/Analyst.Tests.csproj -c Release --no-build --verbosity normal

  evaluate:
    name: Evaluation (accuracy + safety gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Start SQL Server (schema + seed + read-only role)
        run: |
          docker compose up -d
          echo "Waiting for DB init to finish..."
          code=$(docker wait analyst-mssql-init)
          docker logs analyst-mssql-init
          test "$code" = "0"
      - name: Run evaluation (fails on any safety regression)
        run: dotnet run --project tests/Analyst.Eval/Analyst.Eval.csproj -c Release
